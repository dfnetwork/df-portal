version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
    volumes:
      - db-data:/var/lib/postgresql/data
    networks: [backend]

  backend:
    build:
      context: ../apps/backend
    env_file: ../apps/backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ../storage:/storage
    depends_on:
      - db
    networks: [backend]

  frontend:
    build:
      context: ../apps/frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks: [backend]

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../storage:/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks: [backend]

volumes:
  db-data:

networks:
  backend:
    driver: bridge
